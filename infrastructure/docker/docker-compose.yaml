version: "3.8"

services:
  trading-bot:
    container_name: trading-bot
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
    depends_on:
      - redis
      - database
    networks:
      - trading-network

  redis:
    image: "redis:alpine"
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    networks:
      - trading-network

  database:
    image: "postgres:15-alpine"
    container_name: trading-db
    restart: always
    environment:
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: trading_data
    ports:
      - "5432:5432"
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge