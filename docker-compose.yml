###############################################################################
# Bruce AI - Production Docker Compose
# Usage: docker compose up -d
###############################################################################

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bruce_postgres
    restart: always
    environment:
      POSTGRES_DB: bruce_ai
      POSTGRES_USER: bruce
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bruce_secure_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bruce -d bruce_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis Cache ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bruce_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama LLM Server ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: bruce_ollama
    restart: always
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Bruce Backend (FastAPI) ─────────────────────────────────────────────
  bruce-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bruce_backend
    restart: always
    environment:
      # App
      ENVIRONMENT: production
      DEBUG: "false"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      LOG_LEVEL: info
      # Database
      DATABASE_URL: postgresql+asyncpg://bruce:${POSTGRES_PASSWORD:-bruce_secure_2024}@postgres:5432/bruce_ai
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Ollama
      OLLAMA_HOST: http://ollama:11434
      # CORS - allow nginx proxy and frontend
      CORS_ORIGINS: "http://localhost,http://localhost:3000,http://bruce-frontend:3000,http://nginx"
      ALLOWED_HOSTS: "localhost,bruce-backend,nginx"
      # Secrets (override in .env file)
      SECRET_KEY: ${SECRET_KEY:-changeme_in_production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-changeme_jwt_in_production}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - backend_uploads:/app/uploads
      - backend_models:/app/models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Bruce Frontend (Next.js) ────────────────────────────────────────────
  bruce-frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: bruce_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://nginx/api
      NEXT_PUBLIC_WS_URL: ws://nginx/ws
    ports:
      - "3000:3000"
    depends_on:
      bruce-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Telegram Bot ────────────────────────────────────────────────────────
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bruce_telegram
    restart: always
    command: ["python", "-m", "modules.telegram_bot"]
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      BRUCE_API_URL: http://bruce-backend:8000
      OLLAMA_HOST: http://ollama:11434
      REDIS_HOST: redis
      DATABASE_URL: postgresql+asyncpg://bruce:${POSTGRES_PASSWORD:-bruce_secure_2024}@postgres:5432/bruce_ai
    depends_on:
      bruce-backend:
        condition: service_healthy

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: bruce_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      bruce-backend:
        condition: service_healthy
      bruce-frontend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Named Volumes ────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_models:
    driver: local
  backend_uploads:
    driver: local
  backend_models:
    driver: local

# ── Network ──────────────────────────────────────────────────────────────
networks:
  default:
    name: bruce_net
